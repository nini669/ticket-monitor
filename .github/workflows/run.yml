name: Vatican Ticket Monitor

on:
  schedule:
    - cron: '*/5 * * * *'  # 每5分钟查一次
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install requests
        run: pip install requests
      - name: Run monitor
        run: python main.py
