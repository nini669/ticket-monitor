name: Vatican Ticket Monitor
on:
  push:
    branches: [ main ]
  schedule:
    - cron: '*/5 * * * *'  # 门票监控（每5分钟查一次）
    - cron: '*/30 * * * *' # 自动保活（每30分钟一次）
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests
      - name: Run monitor
        run: python main.py
